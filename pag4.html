<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Página 4</title>

<style>
body { margin:0; background:#fff; opacity:1; transition:opacity .2s ease-out; }
body.fade-out { opacity:0; }
img { width:100vw; height:auto; display:block; }
</style>
</head>

<body>

<img src="pag4ed.jpg">

<script>
let startX=0,endX=0;

const NEXT="pag5.html";
const PREV="pag3.html";

document.addEventListener("touchstart",e=>{
  startX=e.changedTouches[0].screenX;
});

document.addEventListener("touchend",e=>{
  endX=e.changedTouches[0].screenX;
  let d=endX-startX;

  if(d<-80) navigate(NEXT);
  if(d>80) navigate(PREV);
});

function navigate(page){
  document.body.classList.add("fade-out");
  setTimeout(()=>{
    window.location.href=page;
  },200);
}
</script>

</body>
</html>
